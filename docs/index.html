<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ButterTube</title>
  <link rel="icon" href="./img/buttertube-icon.png" type="image/png">
  <link rel="stylesheet" href="css/home.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=home,menu">
  <meta content="Buttertube" property="og:title">
  <meta content="te BESTEST video platform on EARHT" property="og:description">
  <meta content="https://butterdogco.com/ButterTube/" property="og:url">
  <meta content="https://butterdogco.com/ButterTube/img/buttertube-wide.png" property="og:image">
  <meta content="#eb8634" data-react-helmet="true" name="theme-color">
  <script src="https://cdn.jsdelivr.net/npm/ios-pwa-splash@1.0.0/cdn.min.js"></script>
  <script>iosPWASplash('img/general/buttertube-icon.png', '#eb8634');</script>
</head>

<body>
  <aside id="sidebar" class="sidebar" role="navigation" aria-label="Site navigation">
    <form class="searchForm mobileSidebarSearchForm" id="mobileSidebarSearchForm" role="search"
      aria-label="Search videos">
      <input type="text" class="input" placeholder="Search" id="mobileSidebarSearchInput" aria-label="Search videos">
      <button type="submit" class="iconButton" aria-label="Submit search">Search</button>
    </form>

    <ul class="navList">
      <li class="navItem">
        <button id="homeButton" class="pageButton iconButton" aria-label="Go to home">
          <span class="material-symbols-rounded">home</span>
          <span class="buttonText">Home</span>
        </button>
      </li>
    </ul>

    <div class="copyright">
      <span>ButterTube was created by <a href="https://butterdogco.com/" target="_blank">ButterDogCo</a>. All videos are
        user-submitted.</span>
    </div>
  </aside>

  <nav>
    <button id="mobileMenuButton" class="mobileMenuButton iconButton" aria-label="Toggle navigation menu">
      <span class="material-symbols-rounded">menu</span>
    </button>

    <div class="logo">
      <img src="./img/buttertube-wide.png" alt="ButterTube Logo" id="logoImage" role="button"
        aria-label="ButterTube Home" width="160" height="40">
    </div>

    <form class="searchForm" id="searchForm" role="search" aria-label="Video Search">
      <input type="text" class="input" placeholder="Search" id="searchInput" aria-label="Search videos">
      <button type="submit" class="iconButton" aria-label="Submit search">Search</button>
    </form>

    <ul class="buttonsRight">
      <li><a class="iconButton" href="https://forms.gle/saeN3wAJgZhNMq4N8" target="_blank">Upload</a></li>
    </ul>
  </nav>

  <main id="main">
    <div id="videos" class="videos"></div>
  </main>

  <section id="channelPage" class="homeOverlay">
    <h1 id="channelName">Channel Name</h1>
    <h3>Videos</h3>
    <div id="channelVideos" class="videos"></div>
  </section>

  <section id="videoPage" class="homeOverlay">
    <video controls="1" id="video"></video>
    <iframe allow="autoplay" allowfullscreen id="iframe"></iframe>
    <div class="videoInfo">
      <h2 id="videoTitle" class="title">Title</h2>
      <span id="videoDesc" class="desc">Desc</span>
      <div class="channelInfo">
        <span id="videoCreator" class="creator" role="button" aria-label="View creator's channel">Creator</span>
        <button class="subscribe" id="subscribe">Subscribe</button>
      </div>
    </div>
  </section>

  <script src="js/app.js" type="module"></script>
</body>

</html>
