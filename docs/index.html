<!DOCTYPE html>
<html>
  <head>
    <title>YouTube Kids</title>
    <link rel="shortcut icon" href="https://github.com/butterdogceo/youtube-kids/blob/main/docs/img/youtube%20kids%20square.png?raw=true">
    <link rel="stylesheet" href="css/home.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body>
    <nav>
      <div class="logo" onclick="home()">
        <h1>YouTube</h1>
        <h1 class="kids">Kids</h1>
        <div id="logoHint">
          <p>^ Click the logo to return to the home page</p>
        </div>
      </div>
      <div class="search">
        <input type="text" placeholder="Search" id="search" onkeydown="search(event)">
      </div>
      <div class="buttonsRight">
        <a href="https://forms.gle/saeN3wAJgZhNMq4N8" target="_blank">Upload</a>
      </div>
    </nav>
    <main id="main">
      <div id="videos" class="videos">
        <!--
        <div class="video" onclick="openVideo()">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQRRakK8jdJdfrdQaIWzPM6YllwG0ZPIcb46oQVnY6T&s">
          <p class="title">SLOW DOWN!</p>
          <p class="desc">beaverton school district</p>
        </div>
        -->
      </div>
    </main>
    
    <div id="channelPage" class="homeOverlay">
      <h1 id="channelName">Channel Name</h1>
      <h3>Videos</h3>
      <div id="channelVideos" class="videos">
        
      </div>
    </div>
    
    <div id="videoPage" class="homeOverlay">
      <video src="" controls="1" id="video"></video>
      <iframe src="" allow="autoplay" allowfullscreen id="iframe"></iframe>
      <div class="videoInfo">
        <h2 id="videoTitle">Title</h2>
        <br>
        <p id="videoDesc">Desc</p>
        <div class="channelInfo">
          <p id="videoCreator">User</p>
          <button class="subscribe" id="subscribe">Subscribe</button>
        </div>
      </div>
    </div>
    
    <script src="js/ads.js"></script>
    <script src="js/home.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
